<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Podcasts | ArchiveOne</title>

<style>
  body {
    margin: 0;
    background-color: #0a0a0a;
    color: #f5f5f5;
    font-family: Arial, Helvetica, sans-serif;
  }

  .container {
    max-width: 600px;
    margin: 100px auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .entry {
    border-left: 1px solid #444;
    padding-left: 15px;
    opacity: 0.8;
  }

  .date {
    font-size: 12px;
    opacity: 0.5;
  }

  .back {
    position: absolute;
    bottom: 30px;
    left: 30px;
    font-size: 16px;
    opacity: 0.6;
    color: #f5f5f5;
    text-decoration: none;
  }
 /* 🔥 BOTÃO BACK */
  .back-button {
    position: absolute;
    bottom: 30px;
    left: 30px;
  }
  .entry {
  position: relative;
  border-left: 1px solid #444;
  padding: 15px 15px 15px 15px;
  opacity: 0.8;
}

.delete-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  color: #f5f5f5;
  font-size: 14px;
  opacity: 0;
  cursor: pointer;
  transition: opacity 0.3s ease;
}

.entry:hover .delete-btn {
  opacity: 0.6;
}

.delete-btn:hover {
  opacity: 1 !important;
}
.title {
  font-size: 18px;
  margin-top: 5px;
}

.meta {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 4px;
}

.notes {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 8px;
  line-height: 1.4;
}
.secondary-text {
  font-size: 16px;
  opacity: 0.6;
  color: #f5f5f5;
  letter-spacing: 0.5px;
  text-decoration: none;
  transition: opacity 0.3s ease;
}

.secondary-text:hover {
  opacity: 1;
}

.back-button {
  position: absolute;
  bottom: 30px;
  left: 30px;
}
</style>
</head>

<body>

<!-- 🔥 BOTÃO BACK (AGORA NO LUGAR CERTO) -->
<a href="index.html" class="secondary-text back-button">← Back</a>

<div class="container" id="timeline">
  <h2>Podcasts</h2>
</div>

<script>
const dados = JSON.parse(localStorage.getItem("archive")) || [];

const podcasts = dados
  .filter(item => item.category === "Podcasts")
  .sort((a, b) => new Date(b.date) - new Date(a.date));

const timeline = document.getElementById("timeline");

podcasts.forEach(item => {
  const div = document.createElement("div");
  div.classList.add("entry");
 div.onclick = () => {
  localStorage.setItem("editando", item.id);
  window.location.href = "archive.html";
};

  div.innerHTML = `
  <button class="delete-btn" onclick="excluir(${item.id})">×</button>

  <div class="date">${item.date || ""}</div>

  <div class="title">${item.title || ""}</div>

  ${item.rating ? `<div class="meta">Rating: ${item.rating}/5</div>` : ""}

  ${item.notes ? `<div class="notes">${linkify(item.notes)}</div>` : ""}

  function linkify(text) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, function(url) {
    return `<a href="${url}" target="_blank" style="color:#f5f5f5; opacity:0.7;">${url}</a>`;
  });
}
`;

  timeline.appendChild(div);
});

  function excluir(id) {
  let dados = JSON.parse(localStorage.getItem("archive")) || [];

  dados = dados.filter(item => item.id !== id);

  localStorage.setItem("archive", JSON.stringify(dados));

  location.reload(); // atualiza a página
}
  function editar(id) {
  let dados = JSON.parse(localStorage.getItem("archive")) || [];
  const item = dados.find(i => i.id === id);

  const novoTitulo = prompt("Edit title:", item.title);
  const novaData = prompt("Edit date:", item.date);
  const novoRating = prompt("Edit rating:", item.rating);
  const novoNotes = prompt("Edit notes:", item.notes);

  if (novoTitulo !== null) item.title = novoTitulo;
  if (novaData !== null) item.date = novaData;
  if (novoRating !== null) item.rating = novoRating;
  if (novoNotes !== null) item.notes = novoNotes;

  localStorage.setItem("archive", JSON.stringify(dados));

  location.reload();
}
  function salvar() {
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const date = document.getElementById("date").value;
  const rating = document.getElementById("rating").value;
  const notes = document.getElementById("notes").value;

  let dados = JSON.parse(localStorage.getItem("archive")) || [];

  const editandoId = localStorage.getItem("editando");

  if (editandoId) {
    // EDITAR
    const item = dados.find(i => i.id == editandoId);

    item.title = title;
    item.category = category;
    item.date = date;
    item.rating = rating;
    item.notes = notes;

    localStorage.removeItem("editando");

  } else {
    // NOVO
    const novoItem = {
      id: Date.now(),
      title,
      category,
      date,
      rating,
      notes
    };

    dados.push(novoItem);
  }

  localStorage.setItem("archive", JSON.stringify(dados));

  alert("Salvo com sucesso");

  location.href = category.toLowerCase().replace(" ", "") + ".html";
}

</script>

</body>
</html>
