<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Articles | ArchiveOne</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        #timeline { max-width: 600px; margin: 40px auto; }
        .entry { border-bottom: 1px solid #333; padding: 15px 0; cursor: pointer; }
        .title { font-size: 18px; font-weight: bold; }
        .date { opacity: 0.5; font-size: 12px; }
        h1 { text-align: center; font-weight: 400; }
        .back { display: block; text-align: center; color: #f5f5f5; text-decoration: none; opacity: 0.5; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Articles</h1>
    <div id="timeline"></div>
    <a href="index.html" class="back">← Back</a>

    <script>
        const supabaseUrl = 'https://vnablodqafeqyuxxirnn.supabase.co';
        const supabaseKey = 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function carregar() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = "index.html"; return; }

            // CORREÇÃO: Removido filtro de user_id para teste de retorno ou ajuste de tipagem do ID
            const { data: itens, error } = await _supabase
                .from('archive')
                .select('*')
                .eq('category', 'Articles')
                .order('entry_date', { ascending: false });

            const container = document.getElementById("timeline");
            container.innerHTML = "";

            if (error) {
                console.error(error);
                container.innerHTML = "<p>Error loading data.</p>";
                return;
            }

            if (itens && itens.length > 0) {
                itens.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "entry";
                    div.onclick = () => { localStorage.setItem("editando", item.id); window.location.href = "archive.html"; };
                    div.innerHTML = `<div class="date">${item.entry_date || ""}</div><div class="title">${item.title}</div>`;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = "<p style='opacity:0.3; text-align:center;'>No entries found.</p>";
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
