<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Articles | ArchiveOne</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; min-height: 100vh; position: relative; }
        
        .menu {
            position: absolute;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 60px;
            z-index: 1000;
            left: 0;
        }
        .secondary-text {
            font-size: 16px;
            opacity: 0.6;
            color: #f5f5f5;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }
        .secondary-text:hover { opacity: 1; }

        h1 { text-align: center; font-weight: 400; margin-top: 100px; font-size: 48px; letter-spacing: 2px; }
        #timeline { max-width: 600px; margin: 40px auto; }
        .entry { border-bottom: 1px solid #333; padding: 15px 0; cursor: pointer; }
        .title { font-size: 18px; font-weight: bold; }
        .date { opacity: 0.5; font-size: 12px; }

        .back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: #f5f5f5;
            text-decoration: none;
            opacity: 0.5;
            font-size: 16px;
        }
        .back:hover { opacity: 1; }
    </style>
</head>
<body>

    <nav class="menu">
        <a href="articles.html" class="secondary-text">Articles</a>
        <a href="books.html" class="secondary-text">Books</a>
        <a href="interviews.html" class="secondary-text">Interviews</a>
        <a href="movies.html" class="secondary-text">Movies</a>
        <a href="podcasts.html" class="secondary-text">Podcasts</a>
        <a href="series.html" class="secondary-text">Series</a>
        <a href="songs.html" class="secondary-text">Songs</a>
        <a href="tvshows.html" class="secondary-text">TV Shows</a>
    </nav>

    <h1>Articles</h1>
    <div id="timeline"></div>
    
    <a href="index.html" class="back">← Back</a>

    <script>
        const supabaseUrl = 'https://vnablodqafeqyuxxirnn.supabase.co';
        const supabaseKey = 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function carregar() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = "index.html"; return; }

            const { data: itens, error } = await _supabase
                .from('archive')
                .select('*')
                .eq('category', 'Articles')
                .eq('user_id', session.user.id)
                .order('entry_date', { ascending: false });

            const container = document.getElementById("timeline");
            container.innerHTML = "";

            if (error) {
                console.error("Erro Supabase:", error);
                container.innerHTML = `<p style='text-align:center;'>Error: ${error.message}</p>`;
                return;
            }

            if (itens && itens.length > 0) {
                itens.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "entry";
                    div.onclick = () => { 
                        localStorage.setItem("editando", item.id); 
                        window.location.href = "archive.html"; 
                    };
                    div.innerHTML = `
                        <div class="date">${item.entry_date || ""}</div>
                        <div class="title">${item.title}</div>
                    `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = "<p style='opacity:0.3; text-align:center; margin-top:50px;'>No entries found.</p>";
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
