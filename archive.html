<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Archive | ArchiveOne</title>

<style>
  body {
    margin: 0;
    background-color: #0a0a0a;
    color: #f5f5f5;
    font-family: Arial, Helvetica, sans-serif;
  }

  .container {
    max-width: 600px;
    margin: 100px auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  h2 {
    font-weight: 400;
    letter-spacing: 1px;
  }

  input, select, textarea {
    background: transparent;
    border: 1px solid #333;
    color: #f5f5f5;
    padding: 10px;
    font-size: 14px;
  }

  button {
    background: transparent;
    border: 1px solid #555;
    color: #f5f5f5;
    padding: 10px;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }

  button:hover {
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="container">
  <h2>New Entry</h2>

  <input type="text" placeholder="Title">

  <select>
    <option>Articles</option>
    <option>Books</option>
    <option>Interviews</option>
    <option>Movies</option>
    <option>Podcasts</option>
    <option>Series</option>
    <option>Songs</option>
    <option>TV Shows</option>
  </select>

  <input type="date">

  <input type="number" placeholder="Rating (1-5)" min="1" max="5">

  <textarea placeholder="Notes"></textarea>

  <button>Add to Archive</button>
</div>

</body>
</html>
