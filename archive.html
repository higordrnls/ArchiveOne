<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>New Entry | ArchiveOne</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Inter', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        h2 { font-weight: 400; font-size: 24px; margin-bottom: 10px; }
        input, select, textarea { background: transparent; border: 1px solid #333; color: #fff; padding: 12px; outline: none; font-family: inherit; font-size: 14px; width: 100%; box-sizing: border-box; }
        select option { background-color: #0a0a0a; color: #f5f5f5; }
        button { padding: 12px; cursor: pointer; border: none; font-weight: bold; font-family: inherit; font-size: 14px; transition: 0.2s; }
        .save { background: #f5f5f5; color: #0a0a0a; text-transform: uppercase; letter-spacing: 1px; }
        .back { background: transparent; color: #f5f5f5; border: 1px solid #333; margin-top: 5px; }
        textarea { height: 100px; resize: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>New Entry</h2>
        <input type="text" id="title" placeholder="Title">
        <select id="category">
            <option value="Articles">Articles</option>
            <option value="Books">Books</option>
            <option value="Interviews">Interviews</option>
            <option value="Movies">Movies</option>
            <option value="Podcasts">Podcasts</option>
            <option value="Series">Series</option>
            <option value="Songs">Songs</option>
            <option value="TV Shows">TV Shows</option>
        </select>
        <input type="date" id="date">
        <select id="rating">
            <option value="">Rating</option>
            <option value="1">1/5</option>
            <option value="2">2/5</option>
            <option value="3">3/5</option>
            <option value="4">4/5</option>
            <option value="5">5/5</option>
        </select>
        <textarea id="notes" placeholder="Notes"></textarea>
        <button class="save" onclick="salvar()">Add to Archive</button>
        <button class="back" onclick="window.location.href='index.html'">Back</button>
    </div>

    <script>
        const _supabase = supabase.createClient('https://vnablodqafeqyuxxirnn.supabase.co', 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR');

        async function salvar() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return alert("Login required");

            const payload = {
                id: Date.now(),
                user_id: session.user.id,
                title: document.getElementById("title").value,
                category: document.getElementById("category").value,
                entry_date: document.getElementById("date").value,
                rating: document.getElementById("rating").value ? parseInt(document.getElementById("rating").value) : null,
                notes: document.getElementById("notes").value
            };

            const { error } = await _supabase.from('archive').insert([payload]);
            if (error) alert(error.message);
            else window.location.href = payload.category.toLowerCase().replace(/\s/g, "") + ".html";
        }
    </script>
</body>
</html>
