<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: Arial; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        input, select, textarea { background: transparent; border: 1px solid #333; color: #fff; padding: 12px; outline: none; }
        
        /* CORREÇÃO DO TEMA BRANCO NOS SELETORES */
        select option { background-color: #0a0a0a; color: #f5f5f5; }
        
        button { padding: 12px; cursor: pointer; border: none; font-weight: bold; }
        .save { background: #f5f5f5; color: #0a0a0a; }
        .back { background: transparent; color: #f5f5f5; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Entry</h2>
        <input type="text" id="title" placeholder="Title">
        <select id="category">
            <option value="Articles">Articles</option>
            <option value="Movies">Movies</option>
            <option value="Books">Books</option>
        </select>
        <input type="date" id="date">
        <select id="rating">
            <option value="">Rating</option>
            <option value="5">5/5</option>
            <option value="4">4/5</option>
            <option value="3">3/5</option>
        </select>
        <textarea id="notes" placeholder="Notes"></textarea>
        <button class="save" onclick="salvar()">Add to Archive</button>
        <button class="back" onclick="window.location.href='index.html'">Back</button>
    </div>

    <script>
        const _supabase = supabase.createClient('https://vnablodqafeqyuxxirnn.supabase.co', 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR');

        async function salvar() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return alert("Login required");

            const payload = {
                user_id: session.user.id,
                title: document.getElementById("title").value,
                category: document.getElementById("category").value,
                entry_date: document.getElementById("date").value,
                rating: document.getElementById("rating").value ? parseInt(document.getElementById("rating").value) : null,
                notes: document.getElementById("notes").value
            };

            const { error } = await _supabase.from('archive').insert([payload]);
            if (error) alert(error.message);
            else window.location.href = payload.category.toLowerCase() + ".html";
        }
    </script>
</body>
</html>
