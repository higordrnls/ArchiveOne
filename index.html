<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ArchiveOne</title>

  <style>
    body {
      margin: 0;
      background-color: #0a0a0a;
      color: #f5f5f5;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      opacity: 0.6;
      margin: 0;
    }

    .enter-link {
      font-size: 16px;
      opacity: 0.6;
      color: #f5f5f5;
      text-decoration: none;
      margin-top: 20px;
      display: inline-block;
      transition: opacity 0.3s ease;
    }

    .enter-link:hover {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ArchiveOne</h1>
    <p>Everything you've ever been.</p>
    <a href="archive.html" class="enter-link">enter archive</a>
  </div>
</body>
</html>
